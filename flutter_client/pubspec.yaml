name: wsrtc
description: >
  WebRTC made easy for Flutter — a WebSocket-based signaling wrapper that
  handles offer/answer negotiation and ICE candidate exchange for you.
  Drop-in rooms, data channels, audio, and video support.
version: 0.1.0
homepage: https://github.com/your-username/wsrtc

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.10.6
  web_socket_channel: ^3.0.1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0